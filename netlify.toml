[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA : toutes les routes inconnues renvoient vers l'app shell.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Les en-têtes de sécurité et de cache sont définis dans public/_headers
# (copié dans dist/). Netlify les applique automatiquement.
